<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claw Kanban</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e10;--surface:#1a1a1f;--surface2:#24242b;--border:#2e2e38;
  --text:#e4e4e7;--text2:#a1a1aa;--text3:#71717a;
  --accent:#ff5a36;--accent2:#ff8a6b;
  --green:#22c55e;--yellow:#eab308;--blue:#3b82f6;--red:#ef4444;--purple:#a78bfa;
  --col-backlog:#71717a;--col-progress:#3b82f6;--col-review:#eab308;--col-done:#22c55e;--col-failed:#ef4444;
  --radius:8px;--radius-lg:12px;
}
[data-theme="light"]{
  --bg:#f4f4f5;--surface:#ffffff;--surface2:#f0f0f3;--border:#e4e4e7;
  --text:#18181b;--text2:#52525b;--text3:#a1a1aa;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--text)}
a{color:var(--accent);text-decoration:none}

/* ─── Layout ─── */
.app{display:flex;flex-direction:column;height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.header h1{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px}
.header h1 span{font-size:20px}
.header-right{display:flex;align-items:center;gap:12px}
.stats-bar{display:flex;gap:16px;font-size:12px;color:var(--text2)}
.stats-bar .stat{display:flex;align-items:center;gap:4px}
.stats-bar .stat .dot{width:8px;height:8px;border-radius:50%}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .15s}
.btn-sm:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

.board{display:flex;flex:1;overflow-x:auto;padding:16px;gap:12px}

/* ─── Column ─── */
.column{min-width:280px;max-width:320px;flex:1;display:flex;flex-direction:column;background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden}
.column-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border)}
.column-header h2{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.column-header .col-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.column-header .count{font-size:11px;color:var(--text3);background:var(--surface2);padding:1px 6px;border-radius:10px;margin-left:4px}
.column-body{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px}
.column-body:empty::after{content:"No tasks";display:block;text-align:center;padding:32px 16px;color:var(--text3);font-size:12px}

/* ─── Task Card ─── */
.card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;cursor:default;transition:all .15s}
.card:hover{border-color:var(--text3)}
.card-title{font-size:13px;font-weight:500;line-height:1.3;margin-bottom:4px;word-break:break-word}
.card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.tag{font-size:10px;padding:1px 6px;border-radius:4px;background:var(--border);color:var(--text2)}
.card-progress{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:6px}
.card-progress-bar{height:100%;border-radius:2px;transition:width .3s ease}
.card-subtasks{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px}
.card-subtasks .check{color:var(--green)}
.card-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.failure-reason{font-size:11px;color:var(--red);border:1px solid var(--red);background:rgba(239,68,68,.1);padding:6px 8px;border-radius:6px;margin-top:8px;line-height:1.4;word-break:break-word}
.card-session{font-size:10px;color:var(--text3);font-family:monospace}
.card-time{font-size:10px;color:var(--text3)}
.card-logs{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px}
.card-logs .log-icon{color:var(--blue)}

/* ─── Detail modal ─── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);max-width:560px;width:100%;max-height:80vh;overflow-y:auto;padding:24px}
.modal h3{font-size:18px;font-weight:600;margin-bottom:12px}
.modal .field{margin-bottom:12px}
.modal .field-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.modal .field-value{font-size:13px;color:var(--text);line-height:1.5}
.modal .subtask-list{list-style:none;padding:0}
.modal .subtask-list li{padding:4px 0;font-size:13px;display:flex;align-items:center;gap:6px}
.modal .subtask-list li .icon{font-size:14px}
.modal .logs-section{margin-top:4px}
.modal .logs-toggle{background:none;border:1px solid var(--border);color:var(--text2);font-size:12px;padding:4px 10px;border-radius:6px;cursor:pointer;transition:all .15s}
.modal .logs-toggle:hover{border-color:var(--accent);color:var(--accent)}
.modal .logs-list{list-style:none;padding:0;margin-top:8px}
.modal .logs-list li{padding:6px 0;font-size:12px;border-bottom:1px solid var(--border);display:flex;gap:8px;line-height:1.4}
.modal .logs-list li:last-child{border-bottom:none}
.modal .logs-list .log-time{color:var(--text3);font-family:monospace;font-size:11px;white-space:nowrap;flex-shrink:0}
.modal .logs-list .log-msg{color:var(--text)}
.modal .close-btn{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer}
.hidden{display:none}

/* ─── Connection status ─── */
.conn-dot{width:8px;height:8px;border-radius:50%;transition:background .3s}
.conn-dot.connected{background:var(--green)}
.conn-dot.disconnected{background:var(--red)}

/* ─── Scrollbar ─── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ─── Responsive ─── */
@media (max-width: 768px) {
  .board {
    flex-direction: column;
    padding: 8px;
    gap: 8px;
  }
  .column {
    min-width: 100%;
    max-width: 100%;
    max-height: 50vh; /* Add a max-height to prevent one column from taking the whole screen */
  }
  .header-right {
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }
  .stats-bar {
    order: 2; /* Move stats below the buttons */
  }
}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <h1><span>🦞</span> Claw Kanban</h1>
    <div class="header-right">
      <div class="stats-bar" id="statsBar"></div>
      <div class="conn-dot disconnected" id="connDot" title="Disconnected"></div>
      <button class="btn-sm" id="themeBtn">☀</button>
    </div>
  </header>
  <div class="board" id="board"></div>
</div>

<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal" id="modal"></div>
</div>

<script>
// ─── Config ───
const COLUMNS = [
  { key: 'backlog',     label: 'Backlog',      color: '#71717a' },
  { key: 'in_progress', label: 'In Progress',  color: '#3b82f6' },
  { key: 'review',      label: 'Review',       color: '#eab308' },
  { key: 'done',        label: 'Done',         color: '#22c55e' },
  { key: 'failed',      label: 'Failed',       color: '#ef4444' },
];

let board = { version: 1, tasks: [], lastSyncAt: null };
let ws = null;
let selectedTask = null;

// ─── WebSocket ───
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    document.getElementById('connDot').className = 'conn-dot connected';
    document.getElementById('connDot').title = 'Connected';
  };

  ws.onclose = () => {
    document.getElementById('connDot').className = 'conn-dot disconnected';
    document.getElementById('connDot').title = 'Disconnected — reconnecting...';
    setTimeout(connect, 3000);
  };

  ws.onmessage = (e) => {
    const event = JSON.parse(e.data);
    handleEvent(event);
  };
}

function handleEvent(event) {
  switch (event.type) {
    case 'full_refresh':
      board = event.board;
      break;
    case 'task_created':
      board.tasks = board.tasks.filter(t => t.id !== event.task.id);
      board.tasks.push(event.task);
      break;
    case 'task_updated':
      board.tasks = board.tasks.map(t => t.id === event.task.id ? event.task : t);
      break;
    case 'task_moved':
      board.tasks = board.tasks.map(t => {
        if (t.id === event.taskId) return { ...t, column: event.to };
        return t;
      });
      break;
    case 'task_deleted':
      board.tasks = board.tasks.filter(t => t.id !== event.taskId);
      break;
  }
  render();
}

// ─── Render ───
function render() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';

  for (const col of COLUMNS) {
    const tasks = board.tasks
      .filter(t => t.column === col.key)
      .sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));

    const colEl = document.createElement('div');
    colEl.className = 'column';
    colEl.innerHTML = `
      <div class="column-header">
        <h2><span class="col-dot" style="background:${col.color}"></span>${col.label}<span class="count">${tasks.length}</span></h2>
      </div>
      <div class="column-body" id="col-${col.key}"></div>
    `;
    boardEl.appendChild(colEl);

    const body = colEl.querySelector('.column-body');
    for (const task of tasks) {
      body.appendChild(renderCard(task, col));
    }
  }

  renderStats();
}

function renderCard(task, col) {
  const card = document.createElement('div');
  card.className = 'card';
  card.onclick = () => showDetail(task);

  const doneSubtasks = (task.subtasks || []).filter(s => s.done).length;
  const totalSubtasks = (task.subtasks || []).length;
  const progressColor = task.progress >= 100 ? 'var(--green)' : task.progress > 0 ? col.color : 'var(--text3)';

  let html = `<div class="card-title">${esc(task.title)}</div>`;

  // Tags
  if (task.tags && task.tags.length > 0) {
    html += `<div class="card-meta">${task.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>`;
  }

  // Progress bar
  if (task.column === 'in_progress' || (task.progress > 0 && task.progress < 100)) {
    html += `<div class="card-progress"><div class="card-progress-bar" style="width:${task.progress}%;background:${progressColor}"></div></div>`;
  }

  // Subtasks
  if (totalSubtasks > 0) {
    html += `<div class="card-subtasks"><span class="check">✓</span> ${doneSubtasks}/${totalSubtasks}</div>`;
  }

  // Logs count
  const logCount = (task.logs || []).length;
  if (logCount > 0) {
    html += `<div class="card-logs"><span class="log-icon">▸</span> ${logCount} log${logCount > 1 ? 's' : ''}</div>`;
  }

  // Failure reason
  if (task.column === 'failed' && task.result) {
    html += `<div class="failure-reason">${esc(task.result)}</div>`;
  }

  // Bottom row
  html += `<div class="card-bottom">`;
  if (task.sessionId) {
    html += `<span class="card-session">${task.sessionId.slice(0, 8)}</span>`;
  } else {
    html += `<span></span>`;
  }
  html += `<span class="card-time">${timeAgo(task.updatedAt)}</span>`;
  html += `</div>`;

  card.innerHTML = html;
  return card;
}

function renderStats() {
  const bar = document.getElementById('statsBar');
  const total = board.tasks.length;
  const inProgress = board.tasks.filter(t => t.column === 'in_progress').length;
  const doneToday = board.tasks.filter(t => {
    if (!t.completedAt) return false;
    const d = new Date(t.completedAt);
    const now = new Date();
    return d.toDateString() === now.toDateString();
  }).length;

  bar.innerHTML = `
    <div class="stat"><div class="dot" style="background:var(--blue)"></div>${inProgress} active</div>
    <div class="stat"><div class="dot" style="background:var(--green)"></div>${doneToday} today</div>
    <div class="stat">${total} total</div>
  `;
}

// ─── Detail Modal ───
function showDetail(task) {
  selectedTask = task;
  const modal = document.getElementById('modal');
  const overlay = document.getElementById('modalOverlay');

  let html = `
    <h3>${esc(task.title)}</h3>
    <div class="field">
      <div class="field-label">Status</div>
      <div class="field-value" style="display:flex;align-items:center;gap:6px">
        <span class="col-dot" style="background:${COLUMNS.find(c=>c.key===task.column)?.color ?? '#999'};width:8px;height:8px;border-radius:50%;display:inline-block"></span>
        ${COLUMNS.find(c=>c.key===task.column)?.label ?? task.column}
        ${task.progress > 0 ? `<span style="color:var(--text3);font-size:12px">(${task.progress}%)</span>` : ''}
      </div>
    </div>
  `;

  if (task.description) {
    html += `<div class="field"><div class="field-label">Description</div><div class="field-value">${esc(task.description)}</div></div>`;
  }

  if (task.tags && task.tags.length) {
    html += `<div class="field"><div class="field-label">Tags</div><div class="card-meta">${task.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div></div>`;
  }

  if (task.subtasks && task.subtasks.length) {
    html += `<div class="field"><div class="field-label">Subtasks</div><ul class="subtask-list">`;
    for (const s of task.subtasks) {
      html += `<li><span class="icon">${s.done ? '✅' : '⬜'}</span>${esc(s.title)}</li>`;
    }
    html += `</ul></div>`;
  }

  if (task.result) {
    html += `<div class="field"><div class="field-label">Result</div><div class="field-value">${esc(task.result)}</div></div>`;
  }

  // Progress logs
  const logs = task.logs || [];
  if (logs.length > 0) {
    html += `<div class="field"><div class="field-label">Progress Log (${logs.length})</div><div class="logs-section">`;
    html += `<button class="logs-toggle" onclick="this.nextElementSibling.classList.toggle('hidden');this.textContent=this.textContent==='Show Details'?'Hide Details':'Show Details'">Show Details</button>`;
    html += `<ul class="logs-list hidden">`;
    for (const log of logs) {
      html += `<li><span class="log-time">${fmtTime(log.timestamp)}</span><span class="log-msg">${esc(log.message)}</span></li>`;
    }
    html += `</ul></div></div>`;
  }

  html += `
    <div class="field"><div class="field-label">Session</div><div class="field-value" style="font-family:monospace;font-size:12px">${task.sessionId ?? '—'}</div></div>
    <div class="field"><div class="field-label">Source</div><div class="field-value">${task.source === 'agent' ? '🦞 Agent reported' : '🔄 Synced from history'}</div></div>
    <div class="field"><div class="field-label">Timeline</div><div class="field-value" style="font-size:12px">
      Created: ${fmtDate(task.createdAt)}<br>
      ${task.startedAt ? `Started: ${fmtDate(task.startedAt)}<br>` : ''}
      ${task.completedAt ? `Completed: ${fmtDate(task.completedAt)}<br>` : ''}
      Updated: ${fmtDate(task.updatedAt)}
    </div></div>
  `;

  modal.innerHTML = html;
  overlay.classList.remove('hidden');
}

document.getElementById('modalOverlay').onclick = (e) => {
  if (e.target === e.currentTarget) {
    document.getElementById('modalOverlay').classList.add('hidden');
    selectedTask = null;
  }
};

// ─── Theme toggle ───
document.getElementById('themeBtn').onclick = () => {
  const html = document.documentElement;
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀' : '☾';
  localStorage.setItem('claw-kanban-theme', next);
};

// Restore theme
const savedTheme = localStorage.getItem('claw-kanban-theme');
if (savedTheme) {
  document.documentElement.dataset.theme = savedTheme;
  document.getElementById('themeBtn').textContent = savedTheme === 'dark' ? '☀' : '☾';
}

// ─── Helpers ───
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s ?? '';
  return d.innerHTML;
}

function timeAgo(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const min = Math.floor(diff / 60000);
  if (min < 1) return 'just now';
  if (min < 60) return `${min}m ago`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `${hr}h ago`;
  const day = Math.floor(hr / 24);
  return `${day}d ago`;
}

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString();
}

function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

// ─── Keyboard ───
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    document.getElementById('modalOverlay').classList.add('hidden');
    selectedTask = null;
  }
});

// ─── Init ───

// Try API first, then fall back to WebSocket only
fetch('/api/board')
  .then(r => r.json())
  .then(data => { board = data; render(); })
  .catch(() => {});

connect();
render();
</script>
</body>
</html>
